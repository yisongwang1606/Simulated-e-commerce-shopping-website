spring.application.name=ecom
spring.profiles.default=dev
server.port=${PORT:8080}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=${ECOM_DATABASE_SCHEMA:}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.data.redis.timeout=5s

app.jwt.secret=${ECOM_JWT_SECRET:change-me-to-a-long-english-only-secret-key-for-demo-project-2026}
app.jwt.expiration=86400000
app.order.default-tax-rate=0.00
app.order.default-shipping-fee=0.00
app.seed.product-master-resource=seed-data/product-master-100.csv
app.integrations.payment-callback-token=${PAYMENT_CALLBACK_TOKEN:local-payment-callback-token}
app.redis.product-ttl=30m
app.redis.token-prefix=auth:token:
app.redis.product-prefix=product:detail:
app.redis.cart-prefix=cart:user:
app.redis.popular-key=product:popular
info.app.name=Enterprise Commerce Platform
info.app.runtime=Java 21
info.app.frontend=React 19 with Vite 7
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db,redis
management.endpoint.health.group.liveness.include=livenessState,ping
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
