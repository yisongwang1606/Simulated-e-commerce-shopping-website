spring.application.name=ecom
spring.profiles.default=dev
server.port=${PORT:8080}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=${ECOM_DATABASE_SCHEMA:}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.data.redis.timeout=5s
spring.data.redis.repositories.enabled=false
spring.kafka.bootstrap-servers=${ECOM_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.rabbitmq.host=${ECOM_RABBITMQ_HOST:127.0.0.1}
spring.rabbitmq.port=${ECOM_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${ECOM_RABBITMQ_USERNAME:ecom}
spring.rabbitmq.password=${ECOM_RABBITMQ_PASSWORD:ecom-rabbit}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.group-id=${ECOM_KAFKA_CONSUMER_GROUP:ecom-order-events}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.eason.ecom.messaging
spring.kafka.consumer.properties.spring.json.value.default.type=com.eason.ecom.messaging.OrderLifecycleEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

app.jwt.secret=${ECOM_JWT_SECRET:change-me-to-a-long-english-only-secret-key-for-demo-project-2026}
app.jwt.expiration=86400000
app.order.default-tax-rate=0.00
app.order.default-shipping-fee=0.00
app.seed.product-master-resource=seed-data/product-master-100.csv
app.integrations.payment-callback-token=${PAYMENT_CALLBACK_TOKEN:local-payment-callback-token}
app.stripe.enabled=${ECOM_STRIPE_ENABLED:false}
app.stripe.secret-key=${ECOM_STRIPE_SECRET_KEY:}
app.stripe.webhook-secret=${ECOM_STRIPE_WEBHOOK_SECRET:}
app.stripe.currency=${ECOM_STRIPE_CURRENCY:cad}
app.stripe.default-test-payment-method=${ECOM_STRIPE_DEFAULT_TEST_PAYMENT_METHOD:pm_card_visa}
app.redis.product-ttl=30m
app.redis.token-prefix=auth:token:
app.redis.product-prefix=product:detail:
app.redis.cart-prefix=cart:user:
app.redis.popular-key=product:popular
app.kafka.order-topic=${ECOM_KAFKA_ORDER_TOPIC:ecom.order.lifecycle.v1}
app.kafka.consumer-group=${ECOM_KAFKA_CONSUMER_GROUP:ecom-order-events}
app.kafka.topic-partitions=${ECOM_KAFKA_TOPIC_PARTITIONS:3}
app.kafka.topic-replicas=${ECOM_KAFKA_TOPIC_REPLICAS:1}
app.rabbitmq.enabled=${ECOM_RABBITMQ_ENABLED:false}
app.rabbitmq.exchange=${ECOM_RABBITMQ_EXCHANGE:ecom.order.lifecycle.exchange}
app.rabbitmq.routing-key=${ECOM_RABBITMQ_ROUTING_KEY:order.lifecycle}
app.rabbitmq.order-queue=${ECOM_RABBITMQ_ORDER_QUEUE:ecom.order.lifecycle.v1.receipts}
app.rabbitmq.consumer-group=${ECOM_RABBITMQ_CONSUMER_GROUP:ecom-rabbit-order-events}
info.app.name=Enterprise Commerce Platform
info.app.runtime=Java 21
info.app.frontend=React 19 with Vite 7
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db,redis,rabbit
management.endpoint.health.group.liveness.include=livenessState,ping
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
