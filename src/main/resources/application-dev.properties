spring.datasource.url=${ECOM_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/ecom_enterprise?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${ECOM_DATASOURCE_USERNAME:root}
spring.datasource.password=${ECOM_DATASOURCE_PASSWORD:ok}

spring.data.redis.host=${ECOM_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${ECOM_REDIS_PORT:6379}
spring.data.redis.password=${ECOM_REDIS_PASSWORD:ok}
