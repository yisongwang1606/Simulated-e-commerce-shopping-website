services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ecom_enterprise
      MYSQL_USER: ${ECOM_DATASOURCE_USERNAME:-ecom}
      MYSQL_PASSWORD: ${ECOM_DATASOURCE_PASSWORD:-ecom}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ok}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${ECOM_REDIS_PASSWORD:-ecom-redis}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$ECOM_REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
    environment:
      ECOM_REDIS_PASSWORD: ${ECOM_REDIS_PASSWORD:-ecom-redis}

  kafka:
    image: apache/kafka:4.2.0
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: ${ECOM_KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1'"]
      interval: 10s
      timeout: 10s
      retries: 18

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    environment:
      KAFKA_CLUSTERS_0_NAME: ecom-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "false"
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ECOM_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecom_enterprise?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      ECOM_DATASOURCE_USERNAME: ${ECOM_DATASOURCE_USERNAME:-ecom}
      ECOM_DATASOURCE_PASSWORD: ${ECOM_DATASOURCE_PASSWORD:-ecom}
      ECOM_REDIS_HOST: redis
      ECOM_REDIS_PORT: 6379
      ECOM_REDIS_PASSWORD: ${ECOM_REDIS_PASSWORD:-ecom-redis}
      ECOM_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ECOM_STRIPE_ENABLED: ${ECOM_STRIPE_ENABLED:-false}
      ECOM_STRIPE_SECRET_KEY: ${ECOM_STRIPE_SECRET_KEY:-}
      ECOM_STRIPE_WEBHOOK_SECRET: ${ECOM_STRIPE_WEBHOOK_SECRET:-}
      ECOM_STRIPE_CURRENCY: ${ECOM_STRIPE_CURRENCY:-cad}
      ECOM_STRIPE_DEFAULT_TEST_PAYMENT_METHOD: ${ECOM_STRIPE_DEFAULT_TEST_PAYMENT_METHOD:-pm_card_visa}
      ECOM_JWT_SECRET: ${ECOM_JWT_SECRET:-change-me-to-a-long-english-only-secret-key-for-demo-project-2026}
      PAYMENT_CALLBACK_TOKEN: ${PAYMENT_CALLBACK_TOKEN:-local-payment-callback-token}
      PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-ui:
        condition: service_started
    networks:
      default:
        aliases:
          - backend-api
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      - backend
    ports:
      - "4173:80"

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    ports:
      - "3000:3000"

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
