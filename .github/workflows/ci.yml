name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Verify backend including integration tests
        run: ./mvnw -B verify

  customer_frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: customer-web/package-lock.json

      - name: Install customer storefront dependencies
        working-directory: customer-web
        run: npm ci

      - name: Lint customer storefront
        working-directory: customer-web
        run: npm run lint

      - name: Build customer storefront
        working-directory: customer-web
        run: npm run build

  admin_frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install admin portal dependencies
        working-directory: admin-web
        run: npm ci

      - name: Lint admin portal
        working-directory: admin-web
        run: npm run lint

      - name: Build admin portal
        working-directory: admin-web
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend
      - customer_frontend
      - admin_frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build backend and web images
        run: docker compose build backend customer-web admin-web
